<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Portal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-100">

    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-700 to-blue-600 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-8">
            <h1 class="text-4xl font-bold">🎓 Training Portal</h1>
            <p class="text-blue-100 mt-2">
                Welcome to your learning dashboard.
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">

        <div class="bg-white rounded-2xl shadow-xl p-8">

            <div class="flex justify-between items-center mb-8">

                <div>
                    <h2 id="batchName" class="text-3xl font-bold text-gray-800">
                        Loading...
                    </h2>

                    <p id="batchDescription" class="text-gray-500 mt-2">
                        Please wait...
                    </p>
                </div>

                <span id="courseCount"
                    class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-semibold">
                    0 Courses
                </span>

            </div>

            <div id="coursesContainer" class="grid md:grid-cols-2 gap-6">
            </div>

        </div>

    </main>

    <footer class="text-center text-gray-500 py-8">
        © 2026 Training Portal | Powered by GitHub Pages & Supabase
    </footer>

    <script>

        const SUPABASE_URL = "https://qmtvnahjgassiqwzpswb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kUj50UAj30OzDYhDH6ydSw_68YW8tuZ";

        // Don't create a variable named "supabase"
        const { createClient } = window.supabase;

        const client = createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        async function loadTrainingPortal() {

            try {

                const { data: batches, error: batchError } = await client
                    .from("batches")
                    .select("*")
                    .order("id", { ascending: true })
                    .limit(1);

                if (batchError) throw batchError;

                if (!batches || batches.length === 0) {
                    document.getElementById("batchName").textContent = "No Batch Found";
                    document.getElementById("batchDescription").textContent = "";
                    return;
                }

                const batch = batches[0];

                document.getElementById("batchName").textContent = batch.batch_name;
                document.getElementById("batchDescription").textContent = batch.description || "";

                const { data: courses, error: courseError } = await client
                    .from("courses")
                    .select("*")
                    .eq("batch_id", batch.id)
                    .order("display_order", { ascending: true });

                if (courseError) throw courseError;

                document.getElementById("courseCount").textContent =
                    `${courses.length} Courses`;

                const container = document.getElementById("coursesContainer");
                container.innerHTML = "";

                courses.forEach(course => {

                    container.innerHTML += `
                        <div class="border rounded-xl p-6 hover:shadow-lg transition bg-slate-50">

                            <h3 class="text-xl font-bold text-gray-800">
                                ${course.course_name}
                            </h3>

                            <p class="text-gray-500 mt-2">
                                ${course.course_description || ""}
                            </p>

                            <a
                                href="${course.course_link}"
                                target="_blank"
                                class="inline-block mt-5 bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition">
                                Start Course →
                            </a>

                        </div>
                    `;

                });

            } catch (err) {
                console.error(err);

                document.getElementById("batchName").textContent = "Error loading data";
                document.getElementById("batchDescription").textContent = err.message;
            }

        }

        loadTrainingPortal();

    </script>

</body>

</html>
